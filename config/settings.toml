[paths]
queue = "/var/lib/memvid/queue"
librarian_queue = "/var/lib/memvid/librarian_queue"
processing = "/var/lib/memvid/processing"
ingest = "/var/lib/memvid/ingest"
done = "/var/lib/memvid/done"
failed = "/var/lib/memvid/failed"
store = "/var/lib/memvid/store"

[embedding]
model_path = "/opt/models/nomic-embed-text-v1/model.onnx"
tokenizer_path = "/opt/models/nomic-embed-text-v1/tokenizer.json"
batch_size = 32
max_length = 512

[ingestion]
commit_interval = 32

[librarian]
enabled = true
endpoint = "http://127.0.0.1:11434/v1/chat/completions"
model = "qwen3:8b"
timeout_ms = 20000
max_candidates = 12
max_selected = 6
max_tokens = 512
temperature = 0.0
top_p = 1.0
presence_penalty = 1.5
keep_alive = "-1"
